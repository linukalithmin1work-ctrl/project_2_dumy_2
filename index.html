<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediVault Pharmacy</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --bg2: #f1f5f9;
            --surface: #fff;
            --border: #e2e8f0;
            --border2: #cbd5e1;
            --text: #0f172a;
            --muted: #64748b;
            --faint: #f8fafc;
            --primary: #0ea5e9;
            --primary-dark: #0284c7;
            --primary-bg: #f0f9ff;
            --green: #10b981;
            --green-bg: #f0fdf4;
            --red: #ef4444;
            --red-bg: #fef2f2;
            --amber: #f59e0b;
            --amber-bg: #fffbeb;
            --violet: #8b5cf6;

            /* dark (staff) */
            --d-bg: #080c14;
            --d-surface: #0e1520;
            --d-surface2: #141d2e;
            --d-border: rgba(255, 255, 255, .07);
            --d-border-hi: rgba(255, 255, 255, .14);
            --d-text: #e8edf5;
            --d-muted: #5a6882;
            --d-faint: #1e293b;
            --d-blue: #4fa3f7;
            --d-green: #22d3a6;
            --d-pink: #e879a0;
            --d-amber: #f5a623;
            --d-orange: #fb923c;
            --d-red: #f87171;
            --d-violet: #a78bfa;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, .15);
            border-radius: 4px;
        }

        /* ANIMATIONS */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(14px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0)
            }

            20% {
                transform: translateX(-10px)
            }

            60% {
                transform: translateX(10px)
            }
        }

        @keyframes slideRight {
            from {
                transform: translateX(-100%)
            }

            to {
                transform: none
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .5
            }
        }

        .fade-up {
            animation: fadeUp .35s ease both;
        }

        .fade-in {
            animation: fadeIn .25s ease both;
        }

        .shake {
            animation: shake .4s ease;
        }

        /* PUBLIC SIDE STYLES */
        .pub-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 66px;
            z-index: 100;
            background: rgba(255, 255, 255, .95);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 0 0 0;
        }

        .pub-sidebar {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: 260px;
            z-index: 200;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transform: translateX(-100%);
            transition: transform .3s ease;
            box-shadow: 4px 0 24px rgba(0, 0, 0, .08);
        }

        .pub-sidebar.open {
            transform: none;
        }

        .pub-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .35);
            z-index: 199;
            animation: fadeIn .2s ease;
            backdrop-filter: blur(2px);
        }

        .pub-nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--muted);
            transition: all .15s;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }

        .pub-nav-item:hover {
            background: var(--bg2);
            color: var(--text);
        }

        .pub-nav-item.active {
            background: var(--primary-bg);
            color: var(--primary);
            font-weight: 600;
        }

        .pub-nav-item.staff-btn {
            background: var(--d-bg);
            color: var(--d-text);
            margin-top: auto;
        }

        .pub-nav-item.staff-btn:hover {
            background: #111827;
        }

        /* CARDS */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 22px;
        }

        .card-dark {
            background: var(--d-surface);
            border: 1px solid var(--d-border);
            border-radius: 14px;
            padding: 22px;
        }

        /* BUTTONS PUBLIC */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all .15s;
            white-space: nowrap;
        }

        .btn:hover:not(:disabled) {
            opacity: .88;
        }

        .btn:active:not(:disabled) {
            transform: scale(.97);
        }

        .btn:disabled {
            opacity: .4;
            cursor: not-allowed;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-outline {
            background: transparent;
            border: 1.5px solid var(--primary);
            color: var(--primary);
        }

        .btn-ghost {
            background: var(--bg2);
            border: 1px solid var(--border);
            color: var(--muted);
        }

        .btn-dark {
            background: var(--d-surface2);
            border: 1px solid var(--d-border-hi);
            color: var(--d-text);
        }

        .btn-sm {
            padding: 7px 14px;
            font-size: 12.5px;
            border-radius: 8px;
        }

        .btn-success-d {
            background: rgba(34, 211, 166, .12);
            border: 1px solid rgba(34, 211, 166, .3);
            color: var(--d-green);
        }

        .btn-danger-d {
            background: rgba(248, 113, 113, .12);
            border: 1px solid rgba(248, 113, 113, .3);
            color: var(--d-red);
        }

        /* INPUTS */
        .inp {
            background: var(--bg2);
            border: 1.5px solid var(--border);
            border-radius: 9px;
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            padding: 10px 14px;
            outline: none;
            width: 100%;
            transition: border-color .2s;
        }

        .inp:focus {
            border-color: var(--primary);
        }

        .inp::placeholder {
            color: var(--muted);
        }

        .inp-dark {
            background: var(--d-faint);
            border: 1px solid var(--d-border-hi);
            border-radius: 8px;
            color: var(--d-text);
            font-family: inherit;
            font-size: 13.5px;
            padding: 9px 13px;
            outline: none;
            width: 100%;
            transition: border-color .2s;
        }

        .inp-dark:focus {
            border-color: rgba(255, 255, 255, .3);
        }

        .inp-dark::placeholder {
            color: var(--d-muted);
        }

        select.inp,
        select.inp-dark {
            appearance: none;
            cursor: pointer;
        }

        label.lbl {
            color: var(--muted);
            font-size: 11.5px;
            font-weight: 600;
            letter-spacing: .04em;
            text-transform: uppercase;
            display: block;
            margin-bottom: 5px;
        }

        label.lbl-dark {
            color: var(--d-muted);
            font-size: 11.5px;
            font-weight: 500;
            letter-spacing: .04em;
            text-transform: uppercase;
            display: block;
            margin-bottom: 5px;
        }

        /* BADGE */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 9px;
            border-radius: 12px;
            font-size: 10.5px;
            font-weight: 700;
            letter-spacing: .04em;
            text-transform: uppercase;
        }

        /* TABLE */
        .tbl {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .tbl th {
            color: var(--muted);
            font-size: 10.5px;
            font-weight: 600;
            letter-spacing: .05em;
            text-transform: uppercase;
            padding: 0 8px 10px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .tbl td {
            padding: 11px 8px;
            border-bottom: 1px solid rgba(0, 0, 0, .04);
            vertical-align: middle;
        }

        .tbl tr:last-child td {
            border-bottom: none;
        }

        .tbl-dark th {
            color: var(--d-muted);
            border-bottom-color: var(--d-border);
        }

        .tbl-dark td {
            border-bottom-color: rgba(255, 255, 255, .04);
        }

        /* MODAL */
        .modal-bg {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .5);
            backdrop-filter: blur(6px);
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn .2s ease;
        }

        .modal-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 28px;
            width: min(560px, 100%);
            max-height: 85vh;
            overflow-y: auto;
            animation: fadeUp .25s ease;
        }

        .modal-box-dark {
            background: var(--d-surface);
            border: 1px solid var(--d-border-hi);
            border-radius: 18px;
            padding: 28px;
            width: min(560px, 100%);
            max-height: 85vh;
            overflow-y: auto;
            animation: fadeUp .25s ease;
        }

        /* STAFF INTERNAL */
        .nav-item-d {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            width: 100%;
            background: none;
            border: none;
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            color: var(--d-muted);
            cursor: pointer;
            border-radius: 8px;
            margin-bottom: 2px;
            transition: all .15s;
            text-align: left;
        }

        .nav-item-d:hover {
            color: var(--d-text);
            background: var(--d-faint);
        }

        .nav-item-d.active {
            color: var(--d-text);
            background: var(--d-faint);
            font-weight: 600;
        }

        .stat-card-d {
            background: var(--d-surface);
            border: 1px solid var(--d-border);
            border-radius: 14px;
            padding: 20px 22px;
            position: relative;
            overflow: hidden;
            transition: border-color .2s;
        }

        .stat-card-d:hover {
            border-color: var(--d-border-hi);
        }

        /* PRESCRIPTION SCAN */
        .scan-zone {
            border: 2px dashed var(--border2);
            border-radius: 16px;
            padding: 48px 24px;
            text-align: center;
            cursor: pointer;
            transition: all .2s;
            background: var(--faint);
        }

        .scan-zone:hover,
        .scan-zone.drag {
            border-color: var(--primary);
            background: var(--primary-bg);
        }

        /* MEDICINE GRID CARDS */
        .med-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px;
            transition: all .2s;
            cursor: default;
        }

        .med-card:hover {
            border-color: var(--primary);
            box-shadow: 0 8px 24px rgba(14, 165, 233, .08);
        }

        /* HERO */
        .hero {
            background: linear-gradient(135deg, #0f172a 0%, #0c2340 40%, #0f3460 100%);
            color: #fff;
            padding: 80px 40px 60px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 70% 60% at 50% -10%, rgba(14, 165, 233, .25), transparent);
        }

        /* ORDER CART */
        .cart-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .qty-btn-pub {
            width: 28px;
            height: 28px;
            border-radius: 7px;
            border: 1.5px solid var(--border2);
            background: var(--bg2);
            color: var(--text);
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .1s;
        }

        .qty-btn-pub:hover {
            background: var(--border);
            border-color: var(--primary);
        }

        /* PILL */
        .pill {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 11px;
            border-radius: 20px;
            font-size: 11.5px;
            font-weight: 600;
        }

        /* SECTIONS */
        .section-title {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 20px;
        }

        .section-sub {
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 28px;
            margin-top: -12px;
        }

        /* RESPONSIVE GRID */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .grid-auto {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }

        @media(max-width:700px) {

            .grid-2,
            .grid-3 {
                grid-template-columns: 1fr;
            }

            .hero {
                padding: 60px 20px 40px;
            }
        }

        /* STEP INDICATOR */
        .step-dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
        }

        /* TYPING EFFECT on scan result */
        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0
            }
        }

        .cursor::after {
            content: '|';
            animation: blink 1s infinite;
        }
    </style>
</head>

        function Badge({ color, bg, children }) {
            return <span className="badge" style={{ background: bg || `${color}22`, color, border: `1px solid ${color}44` }}>{children}</span>;

                <div className="modal-bg" onClick={e => e.target === e.currentTarget && onClose()}>
                    <div className={dark ? "modal-box-dark" : "modal-box"} style={{ width: `min(${width}px,100%)` }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 22 }}>
                            <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 17, fontWeight: 700, color: dark ? "var(--d-text)" : "var(--text)" }}>{title}</div>
                            <button onClick={onClose} style={{ background: "none", border: "none", color: dark ? "var(--d-muted)" : "var(--muted)", fontSize: 24, cursor: "pointer", lineHeight: 1 }}>×</button>
                        </div>
                        {children}
                    </div>
                </div>
            );
        }
        function StatCardD({ icon, label, value, color, sub }) {
            return (
                <div className="stat-card-d fade-up">
                    <div style={{ position: "absolute", inset: 0, background: `radial-gradient(ellipse at top right,${color}08,transparent 70%)`, borderRadius: "inherit", pointerEvents: "none" }} />
                    <div style={{ fontSize: 20, marginBottom: 14 }}>{icon}</div>
                    <div style={{ fontSize: 11, color: "var(--d-muted)", fontWeight: 500, letterSpacing: ".04em", textTransform: "uppercase", marginBottom: 6 }}>{label}</div>
                    <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 22, fontWeight: 700, color }}>{value}</div>
                    {sub && <div style={{ fontSize: 11, color: "var(--d-muted)", marginTop: 4 }}>{sub}</div>}
                </div>
            );
        }

        // ═══════════════════════════ PRESCRIPTION SCANNER ═══════════════════════════
        function PrescriptionScanner({ medicines, onAddToCart }) {
            const [file, setFile] = useState(null);
            const [preview, setPreview] = useState(null);
            const [scanning, setScanning] = useState(false);
            const [result, setResult] = useState(null);
            const [drag, setDrag] = useState(false);
            const fileRef = useRef();

            const handleFile = f => {
                if (!f) return;
                setFile(f); setResult(null);
                const r = new FileReader();
                r.onload = e => setPreview(e.target.result);
                r.readAsDataURL(f);
            };

            // Simulate AI prescription reading
            const scanPrescription = () => {
                setScanning(true); setResult(null);
                setTimeout(() => {
                    // Randomly pick 2-3 medicines from our stock to simulate OCR detection
                    const detected = medicines
                        .filter(m => m.stock > 0)
                        .sort(() => Math.random() - .5)
                        .slice(0, Math.floor(Math.random() * 2) + 2)
                        .map(m => ({ ...m, prescribedQty: Math.floor(Math.random() * 20) + 5, doctorNote: "Take as directed by physician" }));
                    setResult({
                        patientName: "Specimen Patient",
                        doctorName: "Dr. K. Wijesekara",
                        date: today(),
                        medicines: detected,
                    });
                    setScanning(false);
                }, 2500);
            };

            const addAll = () => {
                result.medicines.forEach(m => onAddToCart(m, m.prescribedQty));
                setResult(null); setFile(null); setPreview(null);
            };

            return (
                <div>
                    <div className="section-title">📋 Prescription Scanner</div>
                    <p className="section-sub">Upload your doctor's prescription and we'll identify the medicines automatically</p>

                    {!preview ? (
                        <div
                            className={`scan-zone${drag ? " drag" : ""}`}
                            onDragOver={e => { e.preventDefault(); setDrag(true); }}
                            onDragLeave={() => setDrag(false)}
                            onDrop={e => { e.preventDefault(); setDrag(false); handleFile(e.dataTransfer.files[0]); }}
                            onClick={() => fileRef.current.click()}
                        >
                            <div style={{ fontSize: 52, marginBottom: 14 }}>📄</div>
                            <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 17, fontWeight: 700, marginBottom: 8 }}>Drop prescription here</div>
                            <div style={{ color: "var(--muted)", fontSize: 13, marginBottom: 20 }}>or click to browse — JPG, PNG, PDF supported</div>
                            <button className="btn btn-primary" onClick={e => { e.stopPropagation(); fileRef.current.click(); }}>📁 Choose File</button>
                            <input ref={fileRef} type="file" accept="image/*,.pdf" style={{ display: "none" }} onChange={e => handleFile(e.target.files[0])} />
                        </div>
                    ) : (
                        <div className="card fade-in" style={{ marginBottom: 20 }}>
                            <div style={{ display: "flex", gap: 20, alignItems: "flex-start", flexWrap: "wrap" }}>
                                <div style={{ flexShrink: 0 }}>
                                    <img src={preview} alt="Prescription" style={{ width: 180, height: 220, objectFit: "cover", borderRadius: 10, border: "1px solid var(--border)" }} />
                                    <div style={{ fontSize: 11, color: "var(--muted)", textAlign: "center", marginTop: 6 }}>{file?.name}</div>
                                </div>
                                <div style={{ flex: 1, minWidth: 200 }}>
                                    {!result && !scanning && (
                                        <>
                                            <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 16, fontWeight: 700, marginBottom: 8 }}>Prescription uploaded</div>
                                            <div style={{ color: "var(--muted)", fontSize: 13, marginBottom: 20 }}>Click scan to detect medicines using AI</div>
                                            <div style={{ display: "flex", gap: 10 }}>
                                                <button className="btn btn-primary" onClick={scanPrescription}>🔍 Scan Prescription</button>
                                                <button className="btn btn-ghost" onClick={() => { setFile(null); setPreview(null); }}>Remove</button>
                                            </div>
                                        </>
                                    )}
                                    {scanning && (
                                        <div style={{ padding: "20px 0" }}>
                                            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}>
                                                <div style={{ width: 20, height: 20, border: "2px solid var(--primary)", borderTopColor: "transparent", borderRadius: "50%", animation: "spin 1s linear infinite" }} />
                                                <span style={{ fontWeight: 600 }}>Scanning prescription…</span>
                                            </div>
                                            {["Reading handwriting…", "Identifying medicines…", "Checking dosages…", "Matching stock…"].map((s, i) => (
                                                <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8, fontSize: 13, color: "var(--muted)", animationDelay: `${i * 0.5}s` }}>
                                                    <span style={{ animation: `pulse 1s ${i * 0.3}s infinite` }}>⏳</span> {s}
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                    {result && (
                                        <div className="fade-up">
                                            <div style={{ background: "var(--green-bg)", border: "1px solid rgba(16,185,129,.25)", borderRadius: 10, padding: "12px 14px", marginBottom: 16, fontSize: 13 }}>
                                                ✅ <strong>Scan complete!</strong> Found {result.medicines.length} medicines
                                            </div>
                                            <div style={{ fontSize: 12, color: "var(--muted)", marginBottom: 12 }}>
                                                <strong>Patient:</strong> {result.patientName} &nbsp;·&nbsp; <strong>Doctor:</strong> {result.doctorName} &nbsp;·&nbsp; <strong>Date:</strong> {result.date}
                                            </div>
                                            <div style={{ border: "1px solid var(--border)", borderRadius: 10, overflow: "hidden", marginBottom: 14 }}>
                                                {result.medicines.map((m, i) => (
                                                    <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 14px", borderBottom: i < result.medicines.length - 1 ? "1px solid var(--border)" : "none" }}>
                                                        <div>
                                                            <div style={{ fontWeight: 600, fontSize: 13 }}>{m.name}</div>
                                                            <div style={{ color: "var(--muted)", fontSize: 11 }}>Qty: {m.prescribedQty} {m.unit}</div>
                                                        </div>
                                                        <div style={{ textAlign: "right" }}>
                                                            <div style={{ color: "var(--primary)", fontWeight: 700 }}>{fmt(m.price * m.prescribedQty)}</div>
                                                            <div style={{ fontSize: 11, color: m.stock >= m.prescribedQty ? "var(--green)" : "var(--red)" }}>
                                                                {m.stock >= m.prescribedQty ? "In stock" : "Low stock"}
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                            <div style={{ display: "flex", gap: 10 }}>
                                                <button className="btn btn-primary" onClick={addAll}>🛒 Add All to Cart</button>
                                                <button className="btn btn-ghost" onClick={() => { setFile(null); setPreview(null); setResult(null); }}>Scan Another</button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Manual medicine lookup */}
                    <div style={{ marginTop: 28 }}>
                        <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 16, fontWeight: 700, marginBottom: 6 }}>Or search manually</div>
                        <ManualMedSearch medicines={medicines} onAdd={onAddToCart} />
                    </div>
                </div>
            );
        }

        function ManualMedSearch({ medicines, onAdd }) {
            const [q, setQ] = useState("");
            const res = q.length > 1 ? medicines.filter(m => m.name.toLowerCase().includes(q.toLowerCase()) && m.stock > 0) : [];
            return (
                <div style={{ position: "relative", maxWidth: 480 }}>
                    <input className="inp" value={q} onChange={e => setQ(e.target.value)} placeholder="🔍  Search medicine name…" />
                    {res.length > 0 && (
                        <div style={{ position: "absolute", top: "calc(100% + 4px)", left: 0, right: 0, background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 12, zIndex: 50, maxHeight: 240, overflowY: "auto", boxShadow: "0 16px 40px rgba(0,0,0,.12)" }}>
                            {res.map(m => (
                                <div key={m.id} style={{ padding: "11px 14px", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", borderBottom: "1px solid var(--border)" }}
                                    onClick={() => { onAdd(m, 1); setQ(""); }}>
                                    <div>
                                        <div style={{ fontSize: 13.5, fontWeight: 500 }}>{m.name}</div>
                                        <div style={{ color: "var(--muted)", fontSize: 11 }}>{m.category} · {m.stock} in stock</div>
                                    </div>
                                    <div style={{ color: "var(--primary)", fontWeight: 700 }}>{fmt(m.price)}</div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        // ═══════════════════════════ PUBLIC ORDER PAGE ═══════════════════════════
        function PublicOrderPage({ medicines, onPlaceOrder }) {
            const [page, setPage] = useState("browse"); // browse | prescription | cart | confirm | done
            const [cart, setCart] = useState([]);
            const [search, setSearch] = useState("");
            const [category, setCategory] = useState("All");
            const [form, setForm] = useState({ name: "", phone: "", address: "", note: "" });
            const [orderId, setOrderId] = useState(null);

            const categories = ["All", ...[...new Set(medicines.map(m => m.category))]];
            const filtered = medicines.filter(m => {
                const qs = search.toLowerCase();
                const catOk = category === "All" || m.category === category;
                const searchOk = !search || m.name.toLowerCase().includes(qs) || m.category.toLowerCase().includes(qs);
                return catOk && searchOk && m.stock > 0;
            });

            const addToCart = (med, qty = 1) => {
                setCart(c => {
                    const ex = c.find(x => x.id === med.id);
                    if (ex) return c.map(x => x.id === med.id ? { ...x, qty: Math.min(x.qty + qty, med.stock) } : x);
                    return [...c, { ...med, qty: Math.min(qty, med.stock) }];
                });
            };
            const updateQty = (id, qty) => {
                if (qty <= 0) setCart(c => c.filter(x => x.id !== id));
                else setCart(c => c.map(x => x.id === id ? { ...x, qty } : x));
            };
            const total = cart.reduce((s, x) => s + x.price * x.qty, 0);

            const placeOrder = () => {
                if (!form.name || !form.phone) return;
                const id = onPlaceOrder({ ...form, items: cart.map(x => ({ name: x.name, qty: x.qty, price: x.price })), total });
                setOrderId(id);
                setPage("done");
                setCart([]);
            };

            return (
                <div>
                    {/* Sub nav */}
                    <div style={{ display: "flex", gap: 6, marginBottom: 28, flexWrap: "wrap", alignItems: "center" }}>
                        {[{ id: "browse", label: "💊 Browse Medicines" }, { id: "prescription", label: "📋 Prescription Scan" }, { id: "cart", label: `🛒 Cart (${cart.length})` }].map(p => (
                            <button key={p.id} className="btn btn-sm" style={{
                                background: page === p.id ? "var(--primary)" : "var(--bg2)",
                                color: page === p.id ? "#fff" : "var(--muted)",
                                border: page === p.id ? "none" : "1px solid var(--border)",
                            }} onClick={() => setPage(p.id)}>{p.label}</button>
                        ))}
                    </div>

                    {/* BROWSE */}
                    {page === "browse" && (
                        <div className="fade-up">
                            <div className="section-title">Available Medicines</div>
                            <p className="section-sub">Browse our full range of medicines. Order online for quick pickup.</p>
                            <div style={{ display: "flex", gap: 10, marginBottom: 20, flexWrap: "wrap", alignItems: "center" }}>
                                <input className="inp" value={search} onChange={e => setSearch(e.target.value)} placeholder="🔍  Search medicines…" style={{ maxWidth: 280 }} />
                                <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                                    {categories.map(c => (
                                        <button key={c} className="btn btn-sm" style={{
                                            background: category === c ? "var(--primary)" : "var(--bg2)",
                                            color: category === c ? "#fff" : "var(--muted)",
                                            border: category === c ? "none" : "1px solid var(--border)",
                                        }} onClick={() => setCategory(c)}>{c}</button>
                                    ))}
                                </div>
                            </div>
                            <div className="grid-auto">
                                {filtered.map(m => (
                                    <div key={m.id} className="med-card fade-up">
                                        <div style={{ fontSize: 32, marginBottom: 10 }}>{m.image}</div>
                                        <div style={{ fontFamily: "'Syne',sans-serif", fontWeight: 700, fontSize: 14, marginBottom: 3 }}>{m.name}</div>
                                        <div style={{ marginBottom: 8 }}>
                                            <span className="pill" style={{ background: "var(--primary-bg)", color: "var(--primary)", fontSize: 10 }}>{m.category}</span>
                                        </div>
                                        <div style={{ color: "var(--muted)", fontSize: 12, marginBottom: 12, lineHeight: 1.5 }}>{m.description}</div>
                                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                                            <div>
                                                <div style={{ color: "var(--primary)", fontWeight: 700, fontSize: 16 }}>{fmt(m.price)}</div>
                                                <div style={{ fontSize: 11, color: "var(--green)" }}>per {m.unit}</div>
                                            </div>
                                            <button className="btn btn-primary btn-sm" onClick={() => addToCart(m)}>+ Add</button>
                                        </div>
                                    </div>
                                ))}
                                {filtered.length === 0 && <div style={{ color: "var(--muted)", fontSize: 14, padding: 24, gridColumn: "1/-1" }}>No medicines found.</div>}
                            </div>
                        </div>
                    )}

                    {/* PRESCRIPTION */}
                    {page === "prescription" && (
                        <div className="fade-up">
                            <PrescriptionScanner medicines={medicines} onAddToCart={(m, qty) => { addToCart(m, qty); }} />
                            {cart.length > 0 && (
                                <div style={{ marginTop: 20, padding: 16, background: "var(--primary-bg)", border: "1px solid rgba(14,165,233,.2)", borderRadius: 12, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                                    <span style={{ fontSize: 14 }}><strong>{cart.length}</strong> items in cart — {fmt(total)}</span>
                                    <button className="btn btn-primary btn-sm" onClick={() => setPage("cart")}>View Cart →</button>
                                </div>
                            )}
                        </div>
                    )}

                    {/* CART */}
                    {page === "cart" && (
                        <div className="fade-up">
                            <div className="section-title">Your Cart</div>
                            {cart.length === 0 ? (
                                <div style={{ textAlign: "center", padding: "60px 0", color: "var(--muted)" }}>
                                    <div style={{ fontSize: 52, marginBottom: 12 }}>🛒</div>
                                    <div style={{ fontSize: 14, marginBottom: 16 }}>Your cart is empty</div>
                                    <button className="btn btn-primary" onClick={() => setPage("browse")}>Browse Medicines</button>
                                </div>
                            ) : (
                                <div className="grid-2" style={{ alignItems: "start" }}>
                                    <div>
                                        <div className="card">
                                            {cart.map(item => (
                                                <div key={item.id} className="cart-item">
                                                    <div style={{ flex: 1 }}>
                                                        <div style={{ fontWeight: 600, fontSize: 14 }}>{item.name}</div>
                                                        <div style={{ color: "var(--muted)", fontSize: 12 }}>{fmt(item.price)} per {item.unit}</div>
                                                    </div>
                                                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                                                        <button className="qty-btn-pub" onClick={() => updateQty(item.id, item.qty - 1)}>−</button>
                                                        <span style={{ minWidth: 24, textAlign: "center", fontWeight: 600 }}>{item.qty}</span>
                                                        <button className="qty-btn-pub" onClick={() => updateQty(item.id, item.qty + 1)} disabled={item.qty >= item.stock}>+</button>
                                                    </div>
                                                    <div style={{ color: "var(--primary)", fontWeight: 700, minWidth: 80, textAlign: "right" }}>{fmt(item.price * item.qty)}</div>
                                                    <button onClick={() => updateQty(item.id, 0)} style={{ background: "none", border: "none", color: "var(--muted)", fontSize: 18, cursor: "pointer" }}>×</button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div>
                                        <div className="card" style={{ marginBottom: 16 }}>
                                            <div style={{ fontFamily: "'Syne',sans-serif", fontWeight: 700, fontSize: 15, marginBottom: 16 }}>Order Summary</div>
                                            {cart.map(i => (
                                                <div key={i.id} style={{ display: "flex", justifyContent: "space-between", padding: "4px 0", fontSize: 13 }}>
                                                    <span style={{ color: "var(--muted)" }}>{i.name} ×{i.qty}</span>
                                                    <span>{fmt(i.price * i.qty)}</span>
                                                </div>
                                            ))}
                                            <div style={{ borderTop: "1px solid var(--border)", marginTop: 12, paddingTop: 12, display: "flex", justifyContent: "space-between" }}>
                                                <span style={{ fontWeight: 700 }}>Total</span>
                                                <span style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: 20, color: "var(--primary)" }}>{fmt(total)}</span>
                                            </div>
                                        </div>
                                        <div className="card">
                                            <div style={{ fontFamily: "'Syne',sans-serif", fontWeight: 700, fontSize: 15, marginBottom: 16 }}>Your Details</div>
                                            <div style={{ display: "grid", gap: 12 }}>
                                                <div><label className="lbl">Full Name *</label><input className="inp" value={form.name} onChange={e => setForm(p => ({ ...p, name: e.target.value }))} placeholder="Your name" /></div>
                                                <div><label className="lbl">Phone *</label><input className="inp" value={form.phone} onChange={e => setForm(p => ({ ...p, phone: e.target.value }))} placeholder="07X XXXX XXX" /></div>
                                                <div><label className="lbl">Address</label><input className="inp" value={form.address} onChange={e => setForm(p => ({ ...p, address: e.target.value }))} placeholder="For home delivery (optional)" /></div>
                                                <div><label className="lbl">Note</label><input className="inp" value={form.note} onChange={e => setForm(p => ({ ...p, note: e.target.value }))} placeholder="Any special instructions…" /></div>
                                            </div>
                                            <button className="btn btn-primary" style={{ width: "100%", marginTop: 16 }} onClick={placeOrder} disabled={!form.name || !form.phone}>
                                                ✅ Place Order
                                            </button>
                                            <div style={{ fontSize: 11, color: "var(--muted)", textAlign: "center", marginTop: 10 }}>We will contact you when order is ready for pickup</div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {/* DONE */}
                    {page === "done" && (
                        <div className="fade-up" style={{ textAlign: "center", padding: "60px 0" }}>
                            <div style={{ fontSize: 64, marginBottom: 16 }}>🎉</div>
                            <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 26, fontWeight: 800, marginBottom: 8 }}>Order Placed!</div>
                            <div style={{ color: "var(--muted)", fontSize: 14, marginBottom: 6 }}>Order ID: <strong style={{ color: "var(--primary)" }}>#{orderId}</strong></div>
                            <div style={{ color: "var(--muted)", fontSize: 13, maxWidth: 400, margin: "0 auto 28px" }}>We'll prepare your medicines and contact you when ready for pickup.</div>
                            <button className="btn btn-primary" onClick={() => setPage("browse")}>Continue Shopping</button>
                        </div>
                    )}
                </div>
            );
        }

        // ═══════════════════════════ PUBLIC PAGES ═══════════════════════════
        function HomePage({ medicines, onNavigate }) {
            const inStock = medicines.filter(m => m.stock > 0).length;
            return (
                <div>
                    {/* HERO */}
                    <div className="hero fade-up" style={{ borderRadius: 20, marginBottom: 32, position: "relative" }}>
                        <div style={{ position: "relative", zIndex: 1 }}>
                            <div style={{ display: "inline-flex", alignItems: "center", gap: 8, background: "rgba(14,165,233,.15)", border: "1px solid rgba(14,165,233,.3)", borderRadius: 20, padding: "5px 14px", marginBottom: 20, fontSize: 12, fontWeight: 600, color: "#7dd3fc" }}>
                                ⚕️ &nbsp;MediVault Pharmacy
                            </div>
                            <h1 style={{ fontFamily: "'Syne',sans-serif", fontSize: "clamp(28px,5vw,48px)", fontWeight: 800, lineHeight: 1.15, marginBottom: 16 }}>
                                Your Health,<br />Our Priority
                            </h1>
                            <p style={{ color: "rgba(255,255,255,.65)", fontSize: 15, maxWidth: 520, margin: "0 auto 28px", lineHeight: 1.6 }}>
                                Order medicines online, upload your prescription for instant recognition, and pick up from our pharmacy with ease.
                            </p>
                            <div style={{ display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap" }}>
                                <button className="btn btn-primary" style={{ fontSize: 15, padding: "12px 28px" }} onClick={() => onNavigate("order")}>🛒 Order Now</button>
                                <button className="btn" style={{ background: "rgba(255,255,255,.1)", color: "#fff", border: "1px solid rgba(255,255,255,.2)", fontSize: 15, padding: "12px 28px" }} onClick={() => onNavigate("order")}>📋 Upload Prescription</button>
                            </div>
                        </div>
                    </div>

                    {/* Stats */}
                    <div className="grid-3" style={{ marginBottom: 32 }}>
                        {[
                            { icon: "💊", label: "Medicines Available", value: inStock, color: "var(--primary)" },
                            { icon: "🚀", label: "Fast Pickup", value: "Same Day", color: "var(--green)" },
                            { icon: "📋", label: "Prescription Scan", value: "AI Powered", color: "var(--violet)" },
                        ].map((s, i) => (
                            <div key={i} className="card fade-up" style={{ textAlign: "center", animationDelay: `${i * 0.1}s` }}>
                                <div style={{ fontSize: 28, marginBottom: 10 }}>{s.icon}</div>
                                <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 22, fontWeight: 800, color: s.color, marginBottom: 4 }}>{s.value}</div>
                                <div style={{ color: "var(--muted)", fontSize: 13 }}>{s.label}</div>
                            </div>
                        ))}
                    </div>

                    {/* How it works */}
                    <div style={{ marginBottom: 36 }}>
                        <div className="section-title">How It Works</div>
                        <div className="grid-3">
                            {[
                                { step: 1, icon: "📋", title: "Upload Prescription", desc: "Take a photo of your prescription and our AI will read it automatically." },
                                { step: 2, icon: "🛒", title: "Add to Cart", desc: "Review detected medicines, adjust quantities, and add more if needed." },
                                { step: 3, icon: "🏥", title: "Pickup Ready", desc: "We'll prepare your order and call you when it's ready to collect." },

        // ═══════════════════════════ STAFF PORTAL ═══════════════════════════
        // (Full staff management system — same as before but integrated)

        function StaffLogin({ onLogin }) {
            const [role, setRole] = useState(null);
            const [pin, setPin] = useState("");
            const [error, setError] = useState("");
            const [shake, setShake] = useState(false);
            const m = role ? ROLE_META[role] : null;

            const tryLogin = p => {
                const u = USERS.find(u => u.role === role && u.pin === p);
                if (u) { onLogin(u); }
                else { setShake(true); setError("Incorrect PIN"); setPin(""); setTimeout(() => setShake(false), 450); }
            };
            const handleDigit = d => {
                if (pin.length >= 4) return;
                const next = pin + d; setPin(next); setError("");
                if (next.length === 4) setTimeout(() => tryLogin(next), 180);
            };

            return (
                <div style={{ minHeight: "100vh", background: "var(--d-bg)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 32, padding: 24 }}>
                    <div style={{ position: "fixed", inset: 0, background: "radial-gradient(ellipse 60% 50% at 50% 0%,rgba(79,163,247,.07),transparent)", pointerEvents: "none" }} />
                    <div style={{ textAlign: "center", position: "relative", zIndex: 1 }}>
                        <div style={{ fontSize: 40, marginBottom: 10 }}>⚕️</div>
                        <div style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: 26, color: "var(--d-text)", letterSpacing: "-.5px" }}>MediVault</div>
                        <div style={{ color: "var(--d-muted)", fontSize: 13, marginTop: 4 }}>Staff Portal</div>
                    </div>
                    {!role ? (
                        <div style={{ display: "flex", gap: 14, flexWrap: "wrap", justifyContent: "center", position: "relative", zIndex: 1 }}>
                            {Object.entries(ROLE_META).map(([r, meta]) => (
                                <div key={r} onClick={() => setRole(r)} className="fade-up"
                                    style={{ background: "var(--d-surface)", border: `1px solid ${meta.color}22`, borderRadius: 16, padding: "24px 20px", cursor: "pointer", textAlign: "center", width: 125, transition: "all .2s" }}
                                    onMouseEnter={e => { e.currentTarget.style.transform = "translateY(-3px)"; e.currentTarget.style.borderColor = `${meta.color}55`; }}
                                    onMouseLeave={e => { e.currentTarget.style.transform = "none"; e.currentTarget.style.borderColor = `${meta.color}22`; }}>
                                    <div style={{ fontSize: 30, marginBottom: 10 }}>{meta.icon}</div>
                                    <div style={{ fontFamily: "'Syne',sans-serif", fontWeight: 700, fontSize: 13, color: meta.color }}>{meta.label}</div>
                                    <div style={{ color: "var(--d-muted)", fontSize: 11, marginTop: 4 }}>Tap to login</div>
                                </div>
                            ))}
                        </div>
                    ) : (
                        <div style={{ textAlign: "center", position: "relative", zIndex: 1 }} className="fade-up">
                            <div style={{ marginBottom: 6 }}>
                                <span style={{ background: m.bg, color: m.color, border: `1px solid ${m.color}33`, display: "inline-flex", alignItems: "center", gap: 4, padding: "5px 14px", borderRadius: 20, fontSize: 13, fontWeight: 600 }}>
                                    {m.icon} {m.label} Access
                                </span>
                            </div>
                            <div style={{ color: "var(--d-muted)", fontSize: 13, marginBottom: 24 }}>Enter your 4-digit PIN</div>
                            <div className={shake ? "shake" : ""} style={{ display: "flex", gap: 14, justifyContent: "center", marginBottom: 28 }}>
                                {[0, 1, 2, 3].map(i => (
                                    <div key={i} style={{ width: 14, height: 14, borderRadius: "50%", border: `2px solid ${pin.length > i ? m.color : "rgba(255,255,255,.2)"}`, background: pin.length > i ? m.color : "transparent", transition: "all .2s" }} />
                                ))}
                            </div>
                            {error && <div style={{ color: "var(--d-red)", fontSize: 12.5, marginBottom: 14 }}>{error}</div>}
                            <div style={{ display: "grid", gridTemplateColumns: "repeat(3,68px)", gap: 10, justifyContent: "center" }}>
                                {[1, 2, 3, 4, 5, 6, 7, 8, 9, "", 0, "⌫"].map((d, i) => (
                                    <button key={i} onClick={() => { if (d === "⌫") setPin(p => p.slice(0, -1)); else if (d !== "") handleDigit(String(d)); }}
                                        style={{ width: 68, height: 68, borderRadius: 12, border: "1px solid var(--d-border-hi)", background: "var(--d-surface2)", color: "var(--d-text)", fontSize: 20, fontWeight: 600, fontFamily: "'Syne',sans-serif", cursor: d === "" ? "default" : "pointer", visibility: d === "" ? "hidden" : "visible", transition: "all .15s" }}>
                                        {d}
                                    </button>
                                ))}
                            </div>
                            <button onClick={() => { setRole(null); setPin(""); setError(""); }} style={{ marginTop: 18, background: "none", border: "none", color: "var(--d-muted)", fontSize: 13, cursor: "pointer" }}>
                                ← Choose role
                            </button>
                            <div style={{ marginTop: 14, color: "rgba(255,255,255,.15)", fontSize: 11 }}>
                                Demo: Owner 1111 · Stock 2222 · Counter 3333 · Finance 4444
                            </div>
                        </div>
                    )}
                </div>
            );
        }

                    <div style={{ position: "fixed", top: 0, left: 0, right: 0, height: 58, zIndex: 200, background: "rgba(8,12,20,.95)", backdropFilter: "blur(16px)", borderBottom: "1px solid var(--d-border)", display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 20px" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                            <span style={{ fontSize: 18 }}>⚕️</span>
                            <span style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: 16, color: "var(--d-text)", letterSpacing: "-.5px" }}>MediVault</span>
                            <span style={{ background: "rgba(79,163,247,.15)", color: "#4fa3f7", border: "1px solid rgba(79,163,247,.25)", padding: "2px 9px", borderRadius: 12, fontSize: 10.5, fontWeight: 600 }}>Staff Portal</span>
                        </div>
                        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>

                    </div>
                    <div style={{ paddingTop: 58, display: "grid", gridTemplateColumns: "210px 1fr", minHeight: "calc(100vh - 58px)" }}>
                        <aside style={{ background: "var(--d-surface)", borderRight: "1px solid var(--d-border)", padding: "18px 10px" }}>
                            {tabs.map(t => (
                                <button key={t.id} className={`nav-item-d${active === t.id ? " active" : ""}`} onClick={() => onTab(t.id)}

                                    <span style={{ fontSize: 15 }}>{t.icon}</span>{t.label}

        function DSectionHeader({ title, children }) {
            return (
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 22 }}>
                    <h2 style={{ fontFamily: "'Syne',sans-serif", fontSize: 20, fontWeight: 700, color: "var(--d-text)" }}>{title}</h2>
                    {children && <div style={{ display: "flex", gap: 8 }}>{children}</div>}
                </div>
            );
        }
        function DCard({ title, children, style, extra }) {
            return (
                <div className="card-dark" style={style}>
                    {(title || extra) && <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
                        {title && <div style={{ fontSize: 10.5, fontWeight: 600, letterSpacing: ".08em", textTransform: "uppercase", color: "var(--d-muted)" }}>{title}</div>}
                        {extra}
                    </div>}
                    {children}
                </div>
            );
        }
        function DBadge({ color, children }) { return <span className="badge" style={{ background: `${color}22`, color, border: `1px solid ${color}44` }}>{children}</span>; }
        function DEmpty({ children }) { return <div style={{ color: "var(--d-muted)", textAlign: "center", padding: "32px 0", fontSize: 13 }}>{children}</div>; }

        // ── Owner Dashboard ──
        function OwnerDash({ state, update }) {

            const expiringSoon = state.medicines.filter(m => daysLeft(m.expiry) <= 60);
            const pendingOrders = state.publicOrders?.filter(o => o.status === "pending") || [];

            return (
                <div className="fade-up">
                    {tab === "overview" && <>
                        <DSectionHeader title="Business Overview" />

                            <StatCardD icon="💰" label="Total Revenue" value={fmt(totalSales)} color="#f5a623" />
                            <StatCardD icon="📈" label="Est. Profit" value={fmt(profit)} color="#22d3a6" />
                            <StatCardD icon="📦" label="Medicines" value={state.medicines.length} color="#4fa3f7" />
                            <StatCardD icon="⚠️" label="Low Stock" value={lowStock.length} color="#f87171" />
                            <StatCardD icon="🛒" label="Online Orders" value={state.publicOrders?.length || 0} color="#a78bfa" />
                            <StatCardD icon="⏳" label="Pending Orders" value={pendingOrders.length} color="#fb923c" />

                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 18 }}>
                            <DCard title="⚠️ Low Stock Alerts">
                                {lowStock.length === 0 ? <DEmpty>All stocks adequate</DEmpty> : lowStock.map(m => (
                                    <div key={m.id} style={{ display: "flex", justifyContent: "space-between", padding: "9px 0", borderBottom: "1px solid var(--d-border)" }}>

                                        <span style={{ fontSize: 12, color: "var(--d-red)", fontWeight: 600 }}>{m.stock}/{m.minStock}</span>
                                    </div>
                                ))}
                            </DCard>
                            <DCard title="🛒 Recent Online Orders">

                                    <div key={o.id} style={{ padding: "8px 0", borderBottom: "1px solid var(--d-border)" }}>
                                        <div style={{ display: "flex", justifyContent: "space-between" }}>
                                            <span style={{ color: "var(--d-text)", fontSize: 13, fontWeight: 500 }}>{o.customer}</span>
                                            <DBadge color={o.status === "ready" ? "#22d3a6" : o.status === "pending" ? "#f5a623" : "#4fa3f7"}>{o.status}</DBadge>
                                        </div>
                                        <div style={{ color: "var(--d-muted)", fontSize: 11, marginTop: 2 }}>{o.items.length} items · {fmt(o.total)}</div>

                    </>}
                </div>
