        // ── Stock Dashboard ──
        function StockDash({ state, update, user }) {
            const [tab, setTab] = useState("inventory");
            const [search, setSearch] = useState("");
            const [showAdd, setShowAdd] = useState(false);
            const [showReq, setShowReq] = useState(false);
            const [newMed, setNewMed] = useState({ name: "", category: "", stock: "", minStock: "", price: "", costPrice: "", expiry: "", supplier: "", unit: "tablets" });
            const [req, setReq] = useState({ medicine: "", qty: "", cost: "" });
            const lowStock = state.medicines.filter(m => m.stock < m.minStock);
            const expiringSoon = state.medicines.filter(m => daysLeft(m.expiry) <= 60);
            const filtered = state.medicines.filter(m => m.name.toLowerCase().includes(search.toLowerCase()));

            const addMed = () => {
                if (!newMed.name || !newMed.stock) return;
                const med = { ...newMed, id: state.medIdCounter, stock: +newMed.stock, minStock: +newMed.minStock, price: +newMed.price, costPrice: +newMed.costPrice, image: "💊" };
                update({ medicines: [...state.medicines, med], medIdCounter: state.medIdCounter + 1 });
                setNewMed({ name: "", category: "", stock: "", minStock: "", price: "", costPrice: "", expiry: "", supplier: "", unit: "tablets" });
                setShowAdd(false);
            };
            const submitReq = () => {
                if (!req.medicine || !req.qty) return;
                update({ stockRequests: [...state.stockRequests, { id: Date.now(), medicine: req.medicine, qty: +req.qty, cost: +req.cost, status: "pending", date: today(), requester: user.name }] });
                setReq({ medicine: "", qty: "", cost: "" }); setShowReq(false);
            };

            const tabs = [
                { id: "inventory", label: "Inventory", icon: "📦", color: "#4fa3f7" },
                { id: "alerts", label: "Alerts", icon: "🔔" },
                { id: "requests", label: "Requests", icon: "📋" },
            ];
            return (
                <DashLayoutD color="#4fa3f7" tabs={tabs} active={tab} onTab={setTab} user={user} onExit={() => { }}>
                    {tab === "inventory" && <div className="fade-up">
                        <DSectionHeader title="Stock Inventory">
                            <button className="btn btn-dark btn-sm" onClick={() => setShowReq(true)}>📋 Request Stock</button>
                            <button className="btn btn-sm" style={{ background: "#4fa3f7", color: "#fff" }} onClick={() => setShowAdd(true)}>+ Add Medicine</button>
                        </DSectionHeader>
                        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(160px,1fr))", gap: 14, marginBottom: 24 }}>
                            <StatCardD icon="📦" label="Total Items" value={state.medicines.length} color="#4fa3f7" />
                            <StatCardD icon="⚠️" label="Low Stock" value={lowStock.length} color="#f87171" />
                            <StatCardD icon="🕐" label="Expiring ≤60d" value={expiringSoon.length} color="#fb923c" />
                        </div>
                        <DCard>
                            <input className="inp-dark" value={search} onChange={e => setSearch(e.target.value)} placeholder="🔍  Search medicines…" style={{ marginBottom: 14 }} />
                            <table className="tbl tbl-dark">
                                <thead><tr>{["Medicine", "Category", "Stock", "Min", "Price", "Expiry", "Action"].map(h => <th key={h}>{h}</th>)}</tr></thead>
                                <tbody>
                                    {filtered.map(m => {
                                        const d = daysLeft(m.expiry); const low = m.stock < m.minStock;
                                        return (
                                            <tr key={m.id} style={{ opacity: m.stock === 0 ? .4 : 1 }}>
                                                <td style={{ color: "var(--d-text)", fontWeight: 500 }}>{m.name}</td>
                                                <td style={{ color: "var(--d-muted)" }}>{m.category}</td>
                                                <td style={{ color: low ? "var(--d-red)" : m.stock === 0 ? "var(--d-muted)" : "var(--d-green)", fontWeight: 600 }}>{m.stock}</td>
                                                <td style={{ color: "var(--d-muted)" }}>{m.minStock}</td>
                                                <td style={{ color: "var(--d-text)" }}>{fmt(m.price)}</td>
                                                <td style={{ color: d <= 30 ? "var(--d-red)" : d <= 60 ? "var(--d-orange)" : "var(--d-muted)" }}>{m.expiry}</td>
                                                <td>{d <= 0 && m.stock > 0 && <button className="btn btn-danger-d btn-sm" onClick={() => update({ medicines: state.medicines.map(x => x.id === m.id ? { ...x, stock: 0 } : x) })}>Remove</button>}</td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </DCard>
                        {showAdd && <Modal title="Add New Medicine" onClose={() => setShowAdd(false)} dark>
                            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                                {[["Medicine Name", "name", "text"], ["Category", "category", "text"], ["Stock Qty", "stock", "number"], ["Min Stock", "minStock", "number"], ["Sell Price", "price", "number"], ["Cost Price", "costPrice", "number"], ["Expiry", "expiry", "date"], ["Supplier", "supplier", "text"]].map(([l, k, t]) => (
                                    <div key={k}><label className="lbl-dark">{l}</label><input type={t} className="inp-dark" value={newMed[k]} onChange={e => setNewMed(p => ({ ...p, [k]: e.target.value }))} /></div>
                                ))}
                            </div>
                            <button className="btn btn-sm" style={{ background: "#4fa3f7", color: "#fff", width: "100%", marginTop: 18, padding: "10px" }} onClick={addMed}>Add Medicine</button>
                        </Modal>}
                        {showReq && <Modal title="Request Stock" onClose={() => setShowReq(false)} dark width={440}>
                            <div style={{ display: "grid", gap: 12 }}>
                                {[["Medicine", "medicine", "text"], ["Quantity", "qty", "number"], ["Est. Cost", "cost", "number"]].map(([l, k, t]) => (
                                    <div key={k}><label className="lbl-dark">{l}</label><input type={t} className="inp-dark" value={req[k]} onChange={e => setReq(p => ({ ...p, [k]: e.target.value }))} /></div>
                                ))}
                            </div>
                            <button className="btn btn-sm" style={{ background: "#4fa3f7", color: "#fff", width: "100%", marginTop: 18, padding: "10px" }} onClick={submitReq}>Submit Request</button>
                        </Modal>}
                    </div>}
                    {tab === "alerts" && <div className="fade-up">
                        <DSectionHeader title="Stock Alerts" />
                        {lowStock.length > 0 && <DCard title="⚠️ Low Stock" style={{ marginBottom: 16 }}>
                            {lowStock.map(m => (
                                <div key={m.id} style={{ display: "flex", justifyContent: "space-between", padding: "10px 0", borderBottom: "1px solid var(--d-border)" }}>
                                    <div><div style={{ fontWeight: 600, color: "var(--d-text)" }}>{m.name}</div><div style={{ color: "var(--d-muted)", fontSize: 11 }}>Min: {m.minStock} {m.unit}</div></div>
                                    <div style={{ textAlign: "right" }}><div style={{ color: "var(--d-red)", fontWeight: 700, fontSize: 18 }}>{m.stock}</div><div style={{ color: "var(--d-muted)", fontSize: 11 }}>{m.unit}</div></div>
                                </div>
                            ))}
                        </DCard>}
                        {expiringSoon.length > 0 && <DCard title="🕐 Expiry Alerts">
                            {expiringSoon.map(m => {
                                const d = daysLeft(m.expiry); return (
                                    <div key={m.id} style={{ display: "flex", justifyContent: "space-between", padding: "10px 0", borderBottom: "1px solid var(--d-border)" }}>
                                        <div><div style={{ fontWeight: 600, color: "var(--d-text)" }}>{m.name}</div><div style={{ color: "var(--d-muted)", fontSize: 11 }}>Exp: {m.expiry}</div></div>
                                        <div style={{ textAlign: "right" }}><div style={{ color: d <= 30 ? "var(--d-red)" : "var(--d-orange)", fontWeight: 700 }}>{d}d</div><div style={{ color: "var(--d-muted)", fontSize: 11 }}>Stock: {m.stock}</div></div>
                                    </div>
                                );
                            })}
                        </DCard>}
                        {lowStock.length === 0 && expiringSoon.length === 0 && <DEmpty>✅ No alerts</DEmpty>}
                    </div>}
                    {tab === "requests" && <div className="fade-up">
                        <DSectionHeader title="Stock Requests" />
                        {state.stockRequests.map(r => (
                            <div key={r.id} className="card-dark" style={{ marginBottom: 12, borderColor: `${r.status === "approved" ? "#22d3a6" : r.status === "rejected" ? "#f87171" : "#f5a623"}22` }}>
                                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                                    <div><div style={{ fontWeight: 600, color: "var(--d-text)" }}>{r.medicine}</div><div style={{ color: "var(--d-muted)", fontSize: 12 }}>{r.requester} · {r.date}</div></div>
                                    <DBadge color={r.status === "approved" ? "#22d3a6" : r.status === "rejected" ? "#f87171" : "#f5a623"}>{r.status}</DBadge>
                                </div>
                                <div style={{ fontSize: 13, color: "var(--d-muted)" }}>Qty: <strong style={{ color: "var(--d-text)" }}>{r.qty}</strong> · Cost: <strong style={{ color: "var(--d-green)" }}>{fmt(r.cost)}</strong></div>
                            </div>
                        ))}
                    </div>}
                </DashLayoutD>
            );
        }

        // ── Counter Dashboard ──
        function CounterDash({ state, update, user }) {
            const [tab, setTab] = useState("billing");
            const [search, setSearch] = useState("");
            const [cart, setCart] = useState([]);
            const [done, setDone] = useState(false);
            const [form, setForm] = useState({ name: "", phone: "", address: "", note: "" });

            const results = search.length > 1 ? state.medicines.filter(m => m.name.toLowerCase().includes(search.toLowerCase()) && m.stock > 0) : [];
            const addToCart = med => {
                setCart(c => { const ex = c.find(x => x.id === med.id); if (ex) return c.map(x => x.id === med.id ? { ...x, qty: x.qty + 1 } : x); return [...c, { ...med, qty: 1 }]; });
                setSearch("");
            };
            const updateQty = (id, qty) => { if (qty <= 0) setCart(c => c.filter(x => x.id !== id)); else setCart(c => c.map(x => x.id === id ? { ...x, qty } : x)); };
            const total = cart.reduce((s, x) => s + x.price * x.qty, 0);
            const checkout = () => {
                if (!cart.length) return;
                const bill = { id: state.billIdCounter, date: today(), items: cart.map(x => ({ name: x.name, qty: x.qty, price: x.price })), total, cashier: user.name };
                const updMeds = state.medicines.map(m => { const ci = cart.find(x => x.id === m.id); return ci ? { ...m, stock: m.stock - ci.qty } : m; });
                update({ sales: [...state.sales, bill], medicines: updMeds, billIdCounter: state.billIdCounter + 1 });
                setDone(true); setTimeout(() => { setCart([]); setDone(false); }, 3000);
            };

            const outOfStock = state.medicines.filter(m => m.stock === 0);
            const lowStock = state.medicines.filter(m => m.stock > 0 && m.stock < m.minStock);
            const onlineOrders = (state.publicOrders || []).filter(o => o.status === "pending");

            const tabs = [
                { id: "billing", label: "Billing", icon: "🧾", color: "#e879a0" },
                { id: "online", label: `Online Orders ${onlineOrders.length > 0 ? `(${onlineOrders.length})` : ""}`, icon: "🛒" },
                { id: "medicines", label: "Medicines", icon: "💊" },
                { id: "history", label: "History", icon: "📋" },
            ];
            return (
                <DashLayoutD color="#e879a0" tabs={tabs} active={tab} onTab={setTab} user={user} onExit={() => { }}>
                    {tab === "billing" && <div className="fade-up" style={{ display: "grid", gridTemplateColumns: "1fr 320px", gap: 20 }}>
                        <div>
                            <DSectionHeader title="New Bill" />
                            {(outOfStock.length > 0 || lowStock.length > 0) && <div style={{ background: "rgba(251,146,60,.06)", border: "1px solid rgba(251,146,60,.2)", borderRadius: 10, padding: "10px 14px", marginBottom: 16, fontSize: 12.5 }}>
                                {outOfStock.length > 0 && <div style={{ color: "var(--d-red)" }}>❌ Out of Stock: {outOfStock.map(m => m.name).join(", ")}</div>}
                                {lowStock.length > 0 && <div style={{ color: "var(--d-orange)", marginTop: 2 }}>⚠️ Low: {lowStock.map(m => `${m.name}(${m.stock})`).join(", ")}</div>}
                            </div>}
                            <div style={{ position: "relative", marginBottom: 16 }}>
                                <input className="inp-dark" value={search} onChange={e => setSearch(e.target.value)} placeholder="🔍  Search medicine…" />
                                {results.length > 0 && <div style={{ position: "absolute", top: "calc(100% + 4px)", left: 0, right: 0, background: "var(--d-surface)", border: "1px solid var(--d-border-hi)", borderRadius: 12, zIndex: 50, maxHeight: 230, overflowY: "auto", boxShadow: "0 20px 40px rgba(0,0,0,.5)" }}>
                                    {results.map(m => <div key={m.id} onClick={() => addToCart(m)} style={{ padding: "10px 14px", cursor: "pointer", display: "flex", justifyContent: "space-between", borderBottom: "1px solid var(--d-border)" }}>
                                        <div><div style={{ color: "var(--d-text)", fontSize: 13.5, fontWeight: 500 }}>{m.name}</div><div style={{ color: "var(--d-muted)", fontSize: 11 }}>{m.category} · {m.stock}</div></div>
                                        <div style={{ color: "#e879a0", fontWeight: 700 }}>{fmt(m.price)}</div>
                                    </div>)}
                                </div>}
                            </div>
                            {cart.length > 0 ? <DCard>
                                {cart.map(item => (
                                    <div key={item.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "9px 0", borderBottom: "1px solid var(--d-border)" }}>
                                        <div style={{ flex: 1 }}><div style={{ color: "var(--d-text)", fontSize: 13.5, fontWeight: 500 }}>{item.name}</div><div style={{ color: "var(--d-muted)", fontSize: 12 }}>{fmt(item.price)} each</div></div>
                                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                                            <button onClick={() => updateQty(item.id, item.qty - 1)} style={{ width: 26, height: 26, borderRadius: 6, border: "1px solid var(--d-border-hi)", background: "var(--d-surface2)", color: "var(--d-text)", fontSize: 15, cursor: "pointer" }}>−</button>
                                            <span style={{ color: "var(--d-text)", minWidth: 24, textAlign: "center", fontWeight: 600 }}>{item.qty}</span>
                                            <button onClick={() => updateQty(item.id, item.qty + 1)} disabled={item.qty >= item.stock} style={{ width: 26, height: 26, borderRadius: 6, border: "1px solid var(--d-border-hi)", background: "var(--d-surface2)", color: "var(--d-text)", fontSize: 15, cursor: "pointer" }}>+</button>
                                        </div>
                                        <div style={{ color: "#e879a0", fontWeight: 700, minWidth: 78, textAlign: "right" }}>{fmt(item.price * item.qty)}</div>
                                    </div>
                                ))}
                            </DCard> : <div style={{ textAlign: "center", padding: 60, color: "var(--d-muted)" }}><div style={{ fontSize: 44, marginBottom: 10 }}>🛒</div><div style={{ fontSize: 13 }}>Add medicines to bill</div></div>}
                        </div>
                        <div style={{ paddingTop: 42 }}>
                            <DCard title="Bill Summary">
                                {cart.map(i => <div key={i.id} style={{ display: "flex", justifyContent: "space-between", padding: "4px 0", fontSize: 12.5 }}><span style={{ color: "var(--d-muted)" }}>{i.name} ×{i.qty}</span><span style={{ color: "var(--d-text)" }}>{fmt(i.price * i.qty)}</span></div>)}
                                <div style={{ borderTop: "1px solid var(--d-border)", marginTop: 12, paddingTop: 12, display: "flex", justifyContent: "space-between", marginBottom: 16 }}>
                                    <span style={{ color: "var(--d-muted)", fontWeight: 600 }}>TOTAL</span>
                                    <span style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: 22, color: "#e879a0" }}>{fmt(total)}</span>
                                </div>
                                {done ? <div style={{ textAlign: "center", padding: 14, background: "rgba(34,211,166,.1)", border: "1px solid rgba(34,211,166,.3)", borderRadius: 10, color: "var(--d-green)" }}>✅ Bill #{state.billIdCounter - 1} Complete!</div>
                                    : <button className="btn" style={{ width: "100%", background: "#e879a0", color: "#fff" }} onClick={checkout} disabled={!cart.length}>🖨 Checkout & Print</button>}
                                {cart.length > 0 && !done && <button className="btn btn-dark" style={{ width: "100%", marginTop: 8, fontSize: 13 }} onClick={() => setCart([])}>Clear Cart</button>}
                            </DCard>
                        </div>
                    </div>}
                    {tab === "online" && <div className="fade-up">
                        <DSectionHeader title="Online Orders" />
                        {(state.publicOrders || []).length === 0 ? <DEmpty>No orders yet</DEmpty> : (state.publicOrders || []).slice().reverse().map(o => (
                            <div key={o.id} className="card-dark" style={{ marginBottom: 12, borderColor: `${o.status === "ready" ? "#22d3a6" : o.status === "pending" ? "#f5a623" : "#4fa3f7"}22` }}>
                                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}>
                                    <div>
                                        <div style={{ color: "var(--d-text)", fontWeight: 600 }}>#{o.id} · {o.customer}</div>
                                        <div style={{ color: "var(--d-muted)", fontSize: 12 }}>{o.phone} · {o.date}</div>
                                    </div>
                                    <DBadge color={o.status === "ready" ? "#22d3a6" : o.status === "pending" ? "#f5a623" : "#4fa3f7"}>{o.status}</DBadge>
                                </div>
                                <div style={{ fontSize: 13, color: "var(--d-muted)", marginBottom: 10 }}>{o.items.map(i => `${i.name} ×${i.qty}`).join(" · ")}</div>
                                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                                    <span style={{ color: "var(--d-green)", fontWeight: 700, fontSize: 16 }}>{fmt(o.total)}</span>
                                    {o.status === "pending" && <button className="btn btn-success-d btn-sm" onClick={() => update({ publicOrders: (state.publicOrders || []).map(x => x.id === o.id ? { ...x, status: "ready" } : x) })}>✓ Mark Ready</button>}
                                </div>
                            </div>
                        ))}
                    </div>}
                    {tab === "medicines" && <div className="fade-up">
                        <DSectionHeader title="Available Medicines" />
                        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(200px,1fr))", gap: 14 }}>
                            {state.medicines.map(m => (
                                <div key={m.id} className="card-dark" style={{ opacity: m.stock === 0 ? .45 : 1 }}>
                                    <div style={{ fontWeight: 600, color: "var(--d-text)", fontSize: 14, marginBottom: 4 }}>{m.name}</div>
                                    <div style={{ color: "var(--d-muted)", fontSize: 12, marginBottom: 10 }}>{m.category}</div>
                                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                                        <div><div style={{ color: "#e879a0", fontWeight: 700, fontSize: 15 }}>{fmt(m.price)}</div><div style={{ fontSize: 11, color: m.stock === 0 ? "var(--d-red)" : m.stock < m.minStock ? "var(--d-orange)" : "var(--d-green)" }}>{m.stock === 0 ? "Out of stock" : `${m.stock} in stock`}</div></div>
                                        {m.stock > 0 && <button className="btn btn-sm" style={{ background: "rgba(232,121,160,.12)", border: "1px solid rgba(232,121,160,.3)", color: "#e879a0" }} onClick={() => { addToCart(m); setTab("billing"); }}>+ Add</button>}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>}
                    {tab === "history" && <div className="fade-up">
                        <DSectionHeader title="My Sales History" />
                        <DCard>
                            {state.sales.filter(s => s.cashier === user.name).length === 0 ? <DEmpty>No sales yet</DEmpty> :
                                [...state.sales].filter(s => s.cashier === user.name).reverse().map(s => (
                                    <div key={s.id} style={{ padding: "11px 0", borderBottom: "1px solid var(--d-border)" }}>
                                        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}><span style={{ color: "#e879a0", fontWeight: 600 }}>Bill #{s.id}</span><span style={{ color: "var(--d-green)", fontWeight: 600 }}>{fmt(s.total)}</span></div>
                                        <div style={{ color: "var(--d-muted)", fontSize: 12 }}>{s.date} · {s.items.map(i => `${i.name}×${i.qty}`).join(", ")}</div>
                                    </div>
                                ))}
                        </DCard>
                    </div>}
                </DashLayoutD>
            );
        }

        // ── Finance Dashboard ──
        function FinanceDash({ state, update, user }) {
            const [tab, setTab] = useState("overview");
            const [salEd, setSalEd] = useState(null);
            const [salVal, setSalVal] = useState("");
            const totalRev = state.sales.reduce((s, b) => s + b.total, 0);
            const totalCost = state.medicines.reduce((s, m) => s + m.costPrice * (MEDICINES.find(x => x.id === m.id)?.stock - m.stock || 0), 0);
            const totalSal = state.employees.reduce((s, e) => s + e.salary, 0);
            const netProfit = totalRev - Math.abs(totalCost) - totalSal;
            const approve = id => update({ stockRequests: state.stockRequests.map(r => r.id === id ? { ...r, status: "approved" } : r) });
            const reject = id => update({ stockRequests: state.stockRequests.map(r => r.id === id ? { ...r, status: "rejected" } : r) });

            const tabs = [
                { id: "overview", label: "Overview", icon: "📊", color: "#22d3a6" },
                { id: "profit", label: "P&L", icon: "💹" },
                { id: "salaries", label: "Salaries", icon: "💳" },
                { id: "approvals", label: "Approvals", icon: "✅" },
            ];
            const PLRow = ({ label, value, color, large }) => (
                <div style={{ display: "flex", justifyContent: "space-between", padding: "9px 0", borderBottom: "1px solid var(--d-border)" }}>
                    <span style={{ color: "var(--d-muted)", fontSize: large ? 15 : 13.5, fontWeight: large ? 700 : 400 }}>{label}</span>
                    <span style={{ color: color || "var(--d-text)", fontWeight: 700, fontSize: large ? 20 : 14 }}>{value}</span>
                </div>
            );
            return (
                <DashLayoutD color="#22d3a6" tabs={tabs} active={tab} onTab={setTab} user={user} onExit={() => { }}>
                    {tab === "overview" && <div className="fade-up">
                        <DSectionHeader title="Financial Overview" />
                        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(165px,1fr))", gap: 14, marginBottom: 28 }}>
                            <StatCardD icon="💵" label="Total Revenue" value={fmt(totalRev)} color="#22d3a6" />
                            <StatCardD icon="📦" label="Stock Costs" value={fmt(Math.abs(totalCost))} color="#4fa3f7" />
                            <StatCardD icon="👥" label="Total Salaries" value={fmt(totalSal)} color="#e879a0" />
                            <StatCardD icon="📈" label="Net Profit" value={fmt(netProfit)} color={netProfit > 0 ? "#22d3a6" : "#f87171"} />
                        </div>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 18 }}>
                            <DCard title="Revenue by Day">
                                {state.sales.map(s => (
                                    <div key={s.id} style={{ display: "flex", justifyContent: "space-between", padding: "7px 0", borderBottom: "1px solid var(--d-border)", fontSize: 13 }}>
                                        <span style={{ color: "var(--d-muted)" }}>{s.date} — #{s.id}</span>
                                        <span style={{ color: "var(--d-green)", fontWeight: 600 }}>{fmt(s.total)}</span>
                                    </div>
                                ))}
                            </DCard>
                            <DCard title="Pending Approvals">
                                {state.stockRequests.filter(r => r.status === "pending").length === 0 ? <DEmpty>No pending</DEmpty> :
                                    state.stockRequests.filter(r => r.status === "pending").map(r => (
                                        <div key={r.id} style={{ padding: "10px 0", borderBottom: "1px solid var(--d-border)" }}>
                                            <div style={{ fontWeight: 500, color: "var(--d-text)", marginBottom: 4 }}>{r.medicine}</div>
                                            <div style={{ color: "var(--d-muted)", fontSize: 12, marginBottom: 8 }}>Qty:{r.qty} · {fmt(r.cost)}</div>
                                            <div style={{ display: "flex", gap: 8 }}>
                                                <button className="btn btn-success-d btn-sm" onClick={() => approve(r.id)}>✓ Approve</button>
                                                <button className="btn btn-danger-d btn-sm" onClick={() => reject(r.id)}>✗ Reject</button>
                                            </div>
                                        </div>
                                    ))
                                }
                            </DCard>
                        </div>
                    </div>}
                    {tab === "profit" && <div className="fade-up">
                        <DSectionHeader title="Profit & Loss" />
                        <DCard style={{ maxWidth: 580 }}>
                            <div style={{ marginBottom: 20 }}>
                                <div style={{ fontSize: 10.5, fontWeight: 600, letterSpacing: ".08em", textTransform: "uppercase", color: "var(--d-muted)", marginBottom: 14 }}>Income</div>
                                <PLRow label="Total Sales Revenue" value={fmt(totalRev)} color="var(--d-green)" />
                            </div>
                            <div style={{ marginBottom: 20 }}>
                                <div style={{ fontSize: 10.5, fontWeight: 600, letterSpacing: ".08em", textTransform: "uppercase", color: "var(--d-muted)", marginBottom: 14 }}>Expenses</div>
                                <PLRow label="Medicine Procurement" value={`− ${fmt(Math.abs(totalCost))}`} color="var(--d-red)" />
                                <PLRow label="Staff Salaries" value={`− ${fmt(totalSal)}`} color="var(--d-red)" />
                                <PLRow label="Other" value="− Rs. 0.00" color="var(--d-muted)" />
                            </div>
                            <div style={{ borderTop: "2px solid var(--d-border-hi)", paddingTop: 16 }}>
                                <PLRow label="NET PROFIT" value={fmt(netProfit)} color={netProfit > 0 ? "var(--d-green)" : "var(--d-red)"} large />
                                <PLRow label="Profit Margin" value={`${totalRev ? ((netProfit / totalRev) * 100).toFixed(1) : 0}%`} color="var(--d-blue)" />
                            </div>
                        </DCard>
                    </div>}
                    {tab === "salaries" && <div className="fade-up">
                        <DSectionHeader title="Salary Management" />
                        <div style={{ display: "grid", gap: 12 }}>
                            {state.employees.map(emp => {
                                const m = ROLE_META[emp.role];
                                return (
                                    <div key={emp.id} className="card-dark" style={{ display: "flex", alignItems: "center", gap: 16 }}>
                                        <div style={{ width: 40, height: 40, borderRadius: "50%", background: `linear-gradient(135deg,${m.color},${m.color}55)`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 700, color: "#000", flexShrink: 0 }}>{emp.name.split(" ").map(n => n[0]).join("")}</div>
                                        <div style={{ flex: 1 }}><div style={{ fontWeight: 600, color: "var(--d-text)" }}>{emp.name}</div><div style={{ color: m.color, fontSize: 11.5 }}>{m.icon} {m.label}</div></div>
                                        <div style={{ flex: 1 }}>
                                            {salEd === emp.id ? (
                                                <div style={{ display: "flex", gap: 8 }}>
                                                    <input type="number" className="inp-dark" value={salVal} onChange={e => setSalVal(e.target.value)} style={{ width: 110 }} />
                                                    <button className="btn btn-success-d btn-sm" onClick={() => { update({ employees: state.employees.map(e => e.id === emp.id ? { ...e, salary: +salVal } : e) }); setSalEd(null); }}>Save</button>
                                                </div>
                                            ) : (
                                                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                                                    <span style={{ fontFamily: "'Syne',sans-serif", fontWeight: 700, fontSize: 16, color: "var(--d-text)" }}>{fmt(emp.salary)}</span>
                                                    <button className="btn btn-dark btn-sm" onClick={() => { setSalEd(emp.id); setSalVal(emp.salary); }}>Edit</button>
                                                </div>
                                            )}
                                        </div>
                                        <button className="btn btn-sm" style={{ background: emp.paid ? "rgba(34,211,166,.1)" : "rgba(251,146,60,.1)", border: `1px solid ${emp.paid ? "rgba(34,211,166,.35)" : "rgba(251,146,60,.35)"}`, color: emp.paid ? "var(--d-green)" : "var(--d-orange)" }}
                                            onClick={() => update({ employees: state.employees.map(e => e.id === emp.id ? { ...e, paid: !e.paid } : e) })}>
                                            {emp.paid ? "✓ Paid" : "Mark Paid"}
                                        </button>
                                    </div>
                                );
                            })}
                            <div className="card-dark" style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                                <span style={{ color: "var(--d-muted)", fontSize: 14 }}>Total Payout</span>
                                <span style={{ fontFamily: "'Syne',sans-serif", fontWeight: 700, fontSize: 20, color: "var(--d-green)" }}>{fmt(totalSal)}</span>
                            </div>
                        </div>
                    </div>}
                    {tab === "approvals" && <div className="fade-up">
                        <DSectionHeader title="Stock Approvals" />
                        {state.stockRequests.map(r => (
                            <div key={r.id} className="card-dark" style={{ marginBottom: 12, borderColor: `${r.status === "approved" ? "#22d3a6" : r.status === "rejected" ? "#f87171" : "#f5a623"}22` }}>
                                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}>
                                    <div><div style={{ fontWeight: 600, color: "var(--d-text)", fontSize: 15 }}>{r.medicine}</div><div style={{ color: "var(--d-muted)", fontSize: 12 }}>by {r.requester} · {r.date}</div></div>
                                    <DBadge color={r.status === "approved" ? "#22d3a6" : r.status === "rejected" ? "#f87171" : "#f5a623"}>{r.status.toUpperCase()}</DBadge>
                                </div>
                                <div style={{ fontSize: 13, color: "var(--d-muted)", marginBottom: 12 }}>Qty: <strong style={{ color: "var(--d-text)" }}>{r.qty}</strong> · Cost: <strong style={{ color: "var(--d-green)" }}>{fmt(r.cost)}</strong></div>
                                {r.status === "pending" && <div style={{ display: "flex", gap: 10 }}>
                                    <button className="btn btn-success-d btn-sm" onClick={() => approve(r.id)}>✓ Approve</button>
                                    <button className="btn btn-danger-d btn-sm" onClick={() => reject(r.id)}>✗ Reject</button>
                                </div>}
                            </div>
                        ))}
                    </div>}
                </DashLayoutD>
            );
        }

        // ── Owner full layout ──
        function OwnerFullDash({ state, update, user, onExit }) {
            const [tab, setTab] = useState("overview");
            const totalSales = state.sales.reduce((s, b) => s + b.total, 0);
            const profit = totalSales * 0.38;
            const lowStock = state.medicines.filter(m => m.stock < m.minStock);
            const expiringSoon = state.medicines.filter(m => daysLeft(m.expiry) <= 60);

            const tabs = [
                { id: "overview", label: "Overview", icon: "📊", color: "#f5a623" },
                { id: "sales", label: "Sales", icon: "🧾" },
                { id: "staff", label: "Staff", icon: "👥" },
                { id: "inventory", label: "Inventory", icon: "📦" },
                { id: "orders", label: "Online Orders", icon: "🛒" },
            ];
            return (
                <DashLayoutD color="#f5a623" tabs={tabs} active={tab} onTab={setTab} user={user} onExit={onExit}>
                    {tab === "overview" && <div className="fade-up">
                        <DSectionHeader title="Business Overview" />
                        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(170px,1fr))", gap: 14, marginBottom: 28 }}>
                            <StatCardD icon="💰" label="Total Revenue" value={fmt(totalSales)} color="#f5a623" />
                            <StatCardD icon="📈" label="Est. Profit" value={fmt(profit)} color="#22d3a6" />
                            <StatCardD icon="📦" label="Medicines" value={state.medicines.length} color="#4fa3f7" />
                            <StatCardD icon="⚠️" label="Low Stock" value={lowStock.length} color="#f87171" />
                            <StatCardD icon="🕐" label="Expiring ≤60d" value={expiringSoon.length} color="#fb923c" />
                            <StatCardD icon="🛒" label="Online Orders" value={state.publicOrders?.length || 0} color="#a78bfa" />
                        </div>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 18 }}>
                            <DCard title="⚠️ Low Stock">
                                {lowStock.length === 0 ? <DEmpty>All adequate</DEmpty> : lowStock.map(m => (
                                    <div key={m.id} style={{ display: "flex", justifyContent: "space-between", padding: "9px 0", borderBottom: "1px solid var(--d-border)" }}>
                                        <span style={{ fontSize: 13, color: "var(--d-text)" }}>{m.name}</span>
                                        <span style={{ color: "var(--d-red)", fontWeight: 600, fontSize: 12 }}>{m.stock}/{m.minStock}</span>
                                    </div>
                                ))}
                            </DCard>
                            <DCard title="🕐 Expiring Soon">
                                {expiringSoon.map(m => {
                                    const d = daysLeft(m.expiry); return (
                                        <div key={m.id} style={{ display: "flex", justifyContent: "space-between", padding: "9px 0", borderBottom: "1px solid var(--d-border)" }}>
                                            <span style={{ fontSize: 13, color: "var(--d-text)" }}>{m.name}</span>
                                            <span style={{ fontWeight: 600, fontSize: 12, color: d <= 30 ? "var(--d-red)" : "var(--d-orange)" }}>{d}d</span>
                                        </div>
                                    );
                                })}
                            </DCard>
                        </div>
                    </div>}
                    {tab === "sales" && <div className="fade-up">
                        <DSectionHeader title="Sales History" />
                        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(160px,1fr))", gap: 14, marginBottom: 24 }}>
                            <StatCardD icon="🧾" label="Total Bills" value={state.sales.length} color="#f5a623" />
                            <StatCardD icon="💵" label="Revenue" value={fmt(totalSales)} color="#22d3a6" />
                            <StatCardD icon="📊" label="Avg Bill" value={fmt(totalSales / state.sales.length || 0)} color="#4fa3f7" />
                        </div>
                        <DCard>
                            <table className="tbl tbl-dark">
                                <thead><tr><th>Bill #</th><th>Date</th><th>Items</th><th>Cashier</th><th style={{ textAlign: "right" }}>Total</th></tr></thead>
                                <tbody>
                                    {[...state.sales].reverse().map(s => (
                                        <tr key={s.id}>
                                            <td style={{ color: "var(--d-amber)", fontWeight: 600 }}>#{s.id}</td>
                                            <td style={{ color: "var(--d-muted)" }}>{s.date}</td>
                                            <td style={{ color: "var(--d-muted)" }}>{s.items.length} items</td>
                                            <td style={{ color: "var(--d-muted)" }}>{s.cashier}</td>
                                            <td style={{ textAlign: "right", color: "var(--d-green)", fontWeight: 600 }}>{fmt(s.total)}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </DCard>
                    </div>}
                    {tab === "staff" && <div className="fade-up">
                        <DSectionHeader title="Staff Overview" />
                        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(250px,1fr))", gap: 14 }}>
                            {USERS.filter(u => u.role !== "owner").map(u => {
                                const m = ROLE_META[u.role]; const emp = state.employees.find(e => e.name === u.name);
                                return (
                                    <div key={u.id} className="card-dark">
                                        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
                                            <div style={{ width: 40, height: 40, borderRadius: "50%", background: `linear-gradient(135deg,${m.color},${m.color}55)`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 700, color: "#000" }}>{u.avatar}</div>
                                            <div><div style={{ fontWeight: 600, color: "var(--d-text)" }}>{u.name}</div><div style={{ color: m.color, fontSize: 11.5 }}>{m.icon} {m.label}</div></div>
                                        </div>
                                        {emp && <>
                                            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, padding: "6px 0", borderTop: "1px solid var(--d-border)" }}><span style={{ color: "var(--d-muted)" }}>Salary</span><span style={{ fontWeight: 600, color: "var(--d-text)" }}>{fmt(emp.salary)}</span></div>
                                            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, padding: "6px 0", borderTop: "1px solid var(--d-border)" }}><span style={{ color: "var(--d-muted)" }}>Payment</span><span style={{ color: emp.paid ? "var(--d-green)" : "var(--d-red)", fontWeight: 600 }}>{emp.paid ? "✓ Paid" : "⏳ Pending"}</span></div>
                                        </>}
                                    </div>
                                );
                            })}
                        </div>
                    </div>}
                    {tab === "inventory" && <div className="fade-up">
                        <DSectionHeader title="Full Inventory" />
                        <DCard>
                            <table className="tbl tbl-dark">
                                <thead><tr>{["Medicine", "Category", "Stock", "Min", "Sell", "Cost", "Expiry", "Status"].map(h => <th key={h}>{h}</th>)}</tr></thead>
                                <tbody>
                                    {state.medicines.map(m => {
                                        const d = daysLeft(m.expiry); const low = m.stock < m.minStock; return (
                                            <tr key={m.id}>
                                                <td style={{ color: "var(--d-text)", fontWeight: 500 }}>{m.name}</td>
                                                <td style={{ color: "var(--d-muted)" }}>{m.category}</td>
                                                <td style={{ color: low ? "var(--d-red)" : "var(--d-green)", fontWeight: 600 }}>{m.stock}</td>
                                                <td style={{ color: "var(--d-muted)" }}>{m.minStock}</td>
                                                <td style={{ color: "var(--d-text)" }}>{fmt(m.price)}</td>
                                                <td style={{ color: "var(--d-muted)" }}>{fmt(m.costPrice)}</td>
                                                <td style={{ color: d <= 60 ? "var(--d-orange)" : "var(--d-muted)" }}>{m.expiry}</td>
                                                <td>{low && <DBadge color="#f87171">Low</DBadge>}{d <= 60 && <DBadge color="#fb923c">{d}d</DBadge>}{!low && d > 60 && <DBadge color="#22d3a6">OK</DBadge>}</td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </DCard>
                    </div>}
                    {tab === "orders" && <div className="fade-up">
                        <DSectionHeader title="Online Orders" />
                        {(state.publicOrders || []).length === 0 ? <DEmpty>No orders yet</DEmpty> : (state.publicOrders || []).slice().reverse().map(o => (
                            <div key={o.id} className="card-dark" style={{ marginBottom: 12, borderColor: `${o.status === "ready" ? "#22d3a6" : "#f5a623"}22` }}>
                                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}>
                                    <div><div style={{ fontWeight: 600, color: "var(--d-text)" }}>#{o.id} · {o.customer}</div><div style={{ color: "var(--d-muted)", fontSize: 12 }}>{o.phone} · {o.date}</div></div>
                                    <DBadge color={o.status === "ready" ? "#22d3a6" : "#f5a623"}>{o.status}</DBadge>
                                </div>
                                <div style={{ fontSize: 13, color: "var(--d-muted)", marginBottom: 8 }}>{o.items.map(i => `${i.name}×${i.qty}`).join(" · ")}</div>
                                <div style={{ color: "var(--d-green)", fontWeight: 700 }}>{fmt(o.total)}</div>
                            </div>
                        ))}
                    </div>}
                </DashLayoutD>
            );
        }

        // ═══════════════════════════ STAFF PORTAL ROUTER ═══════════════════════════
        function StaffPortal({ state, update, onExit }) {
            const [staffUser, setStaffUser] = useState(null);

            if (!staffUser) return <StaffLogin onLogin={setStaffUser} />;

            // Wrap each dash so it can exit staff portal
            const wrapExit = C => <C state={state} update={update} user={staffUser} onExit={() => setStaffUser(null)} />;

            if (staffUser.role === "owner") return <OwnerFullDash state={state} update={update} user={staffUser} onExit={() => setStaffUser(null)} />;
            if (staffUser.role === "stock") return <StockDash state={state} update={update} user={staffUser} onExit={() => setStaffUser(null)} />;
            if (staffUser.role === "counter") return <CounterDash state={state} update={update} user={staffUser} onExit={() => setStaffUser(null)} />;
            if (staffUser.role === "finance") return <FinanceDash state={state} update={update} user={staffUser} onExit={() => setStaffUser(null)} />;
            return null;
        }

        // ═══════════════════════════ MAIN PUBLIC APP ═══════════════════════════
        function App() {
            const [page, setPage] = useState("home");      // home | order | contact | staff
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [state, setState] = useState(globalState);

            const update = patch => { const next = { ...state, ...patch }; globalState = next; setState(next); };

            const placeOrder = orderData => {
                const id = state.orderIdCounter;
                update({
                    publicOrders: [...(state.publicOrders || []), { id, customer: orderData.name, phone: orderData.phone, address: orderData.address, note: orderData.note, items: orderData.items, total: orderData.total, status: "pending", date: today() }],
                    orderIdCounter: id + 1,
                });
                return id;
            };

            const navigate = p => { setPage(p); setSidebarOpen(false); };

            if (page === "staff") return <StaffPortal state={state} update={update} onExit={() => setPage("home")} />;

            const navItems = [
                { id: "home", label: "Home", icon: "🏠" },
                { id: "order", label: "Order Medicines", icon: "💊" },
                { id: "contact", label: "Contact Us", icon: "📞" },
            ];

            return (
                <div style={{ minHeight: "100vh", background: "var(--bg)" }}>

                    {/* SIDEBAR OVERLAY */}
                    {sidebarOpen && <div className="pub-overlay" onClick={() => setSidebarOpen(false)} />}

                    {/* SIDEBAR */}
                    <div className={`pub-sidebar${sidebarOpen ? " open" : ""}`}>
                        {/* Logo */}
                        <div style={{ padding: "20px 20px 16px", borderBottom: "1px solid var(--border)" }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                                <span style={{ fontSize: 24 }}>⚕️</span>
                                <div>
                                    <div style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: 17, letterSpacing: "-.5px" }}>MediVault</div>
                                    <div style={{ color: "var(--muted)", fontSize: 11 }}>Pharmacy</div>
                                </div>
                            </div>
                        </div>

                        {/* Nav */}
                        <div style={{ padding: "12px 12px", flex: 1 }}>
                            <div style={{ fontSize: 10.5, fontWeight: 600, letterSpacing: ".06em", textTransform: "uppercase", color: "var(--muted)", padding: "0 4px", marginBottom: 8 }}>Menu</div>
                            {navItems.map(n => (
                                <button key={n.id} className={`pub-nav-item${page === n.id ? " active" : ""}`} onClick={() => navigate(n.id)}>
                                    <span style={{ fontSize: 18 }}>{n.icon}</span>{n.label}
                                </button>
                            ))}
                        </div>

                        {/* Staff button at bottom */}
                        <div style={{ padding: "12px 12px 20px", borderTop: "1px solid var(--border)" }}>
                            <button className="btn" style={{ width: "100%", background: "var(--d-bg)", color: "var(--d-text)", border: "1px solid rgba(255,255,255,.1)", justifyContent: "flex-start", gap: 10, padding: "11px 14px", borderRadius: 10, fontSize: 14 }} onClick={() => navigate("staff")}>
                                <span style={{ fontSize: 18 }}>🔒</span> Staff Login
                            </button>
                            <div style={{ color: "var(--muted)", fontSize: 11, textAlign: "center", marginTop: 10 }}>Internal staff portal access</div>
                        </div>
                    </div>

                    {/* TOP NAVBAR */}
                    <div className="pub-nav">
                        {/* Hamburger */}
                        <button onClick={() => setSidebarOpen(o => !o)} style={{ width: 66, height: 66, background: "none", border: "none", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 5, flexShrink: 0 }}>
                            {[0, 1, 2].map(i => <div key={i} style={{ width: 22, height: 2, background: "var(--text)", borderRadius: 2, transition: "all .2s", transform: sidebarOpen && i === 0 ? "rotate(45deg) translate(5px,5px)" : sidebarOpen && i === 1 ? "scaleX(0)" : sidebarOpen && i === 2 ? "rotate(-45deg) translate(5px,-5px)" : "none" }} />)}
                        </button>

                        {/* Brand */}
                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                            <span style={{ fontSize: 20 }}>⚕️</span>
                            <span style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: 18, letterSpacing: "-.5px" }}>MediVault</span>
                            <span style={{ color: "var(--muted)", fontSize: 13, fontWeight: 300 }}>Pharmacy</span>
                        </div>

                        {/* Right actions */}
                        <div style={{ display: "flex", alignItems: "center", gap: 10, marginRight: 16 }}>
                            {navItems.map(n => (
                                <button key={n.id} className="btn btn-ghost btn-sm" style={{ display: "none", background: page === n.id ? "var(--primary-bg)" : "", color: page === n.id ? "var(--primary)" : "var(--muted)", border: page === n.id ? "1px solid rgba(14,165,233,.2)" : "1px solid var(--border)" }} onClick={() => navigate(n.id)}>{n.label}</button>
                            ))}
                            <button className="btn btn-primary btn-sm" onClick={() => navigate("order")}>Order Medicines</button>
                        </div>
                    </div>

                    {/* PAGE CONTENT */}
                    <div style={{ paddingTop: 66, maxWidth: 1100, margin: "0 auto", padding: "82px 24px 60px" }}>
                        {page === "home" && <HomePage medicines={state.medicines} onNavigate={navigate} />}
                        {page === "order" && <PublicOrderPage medicines={state.medicines} onPlaceOrder={placeOrder} />}
                        {page === "contact" && <ContactPage />}
                    </div>

                    {/* FOOTER */}
                    <footer style={{ borderTop: "1px solid var(--border)", padding: "28px 24px", textAlign: "center", color: "var(--muted)", fontSize: 13 }}>
                        <span style={{ fontFamily: "'Syne',sans-serif", fontWeight: 700, color: "var(--text)" }}>⚕️ MediVault Pharmacy</span>
                        &nbsp;·&nbsp; 123 Health Street, Colombo 07 &nbsp;·&nbsp; 011 234 5678 &nbsp;·&nbsp; info@medivault.lk
                    </footer>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
</body>

</html>
